      function Number({ num, selected }) {
        return selected ? <h1>{num}</h1> : <h3>{num}</h3>;
      }

      const ele = (
        <>
          {[1, 2, 3, 4, 5, 6, 7, 9, 10].map((num) => (
            <Number num={num} selected={num === 3} />
          ))}
        </>
      );

      ReactDOM.render(ele, rootEle);
    </script>
  </body>
