    <script type="text/babel">
      const rootEle = document.getElementById("root");

      function random() {
        const num = Math.floor(Math.random() * (10 - 1) + 1);
        const ele = (
          <>
            <button>{num}</button>
            <div>
              <p>{num}</p>
            </div>
          </>
        );

        ReactDOM.render(ele, rootEle);
      }
      setInterval(random, 1000);
    </script>
