    <script type="text/babel">
      const rootEle = document.getElementById("root");

      const paint = (title, desc) => (
        <>
          <h1>{title}</h1>
          <h3>{desc}</h3>
        </>
      );

      const Text = ({ text }) => {
        // text가 대문자로 시작하게 되면 h1 소문자면 h3
        if (text.charAt(0) === text.charAt(0).toUpperCase()) {
          return <h1>{text}</h1>;
        } else {
          return <h3>{text}</h3>;
        }
      };

      const ele = (
        <>
          <Text text="Text" />
          <Text text="text" />
        </>
      );

      ReactDOM.render(ele, rootEle);
    </script>
