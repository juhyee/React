<!DOCTYPE html>
<html lang="en">
  <head>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const rootEle = document.getElementById("root");
      const state = { keyword: "", typing: false, result: "" };

      const App = () => {
        function handleChange(event) {
          setState({ typing: true, keyword: event.target.value });
        }

        function handleClick() {
          setState({
            typing: false,
            result: `We find results of ${state.keyword}`
          });
        }

        return (
          <>
            <input onChange={handleChange} />
            <button onClick={handleClick}>search</button>
            <p>
              {state.typing ? `Looking for ${state.keyword} ...` : state.result}
            </p>
          </>
        );
      };

      function setState(newState) {
        // Object.assign 객체의 내용을 복사한다. 다른 부분이 있을 경우 덮어씌우고 없으면 유지한다.
        Object.assign(state, newState);
        render();
      }

      function render() {
        ReactDOM.render(<App />, rootEle);
      }

      render();
    </script>
  </body>
</html>
